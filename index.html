<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Viaje Fractal VR — Mandelbulb Vivo</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; width:100%; height:100%; overflow:hidden; background:#000; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
  canvas { display:block; }
  #hud {
    position:fixed; left:16px; top:16px; z-index:5;
    width:min(320px, calc(100vw - 32px));
    padding:14px 16px;
    color:#dfe9ff;
    background:linear-gradient(150deg, rgba(10,8,26,.86), rgba(8,6,18,.5));
    border:1px solid rgba(150,130,255,.22);
    border-radius:16px;
    box-shadow:0 18px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
    backdrop-filter:blur(14px);
    user-select:none;
  }
  #hud h1 { margin:0 0 4px; font-size:15px; letter-spacing:.5px; font-weight:700; }
  #hud .sub { margin:0 0 12px; font-size:11px; line-height:1.4; color:rgba(200,210,255,.62); }
  .ctrl { margin:10px 0; }
  .ctrl label { display:flex; justify-content:space-between; font-size:11px; letter-spacing:.3px; color:rgba(214,224,255,.85); margin-bottom:5px; }
  .ctrl label span { color:#b9a8ff; font-variant-numeric:tabular-nums; }
  input[type=range] { width:100%; accent-color:#9a7bff; height:4px; }
  .row { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  button {
    flex:1; min-width:84px;
    appearance:none; cursor:pointer;
    border:1px solid rgba(150,130,255,.3);
    border-radius:999px;
    background:rgba(90,70,200,.2);
    color:#ede8ff; font-family:inherit; font-size:12px; font-weight:700;
    padding:8px 10px;
  }
  button:hover { background:rgba(120,95,240,.34); }
  button.active { background:rgba(150,120,255,.5); border-color:rgba(190,170,255,.6); }
  #keys { margin-top:12px; font-size:10px; line-height:1.5; color:rgba(190,200,235,.5); }
  #keys b { color:rgba(214,224,255,.78); font-weight:600; }
  body.xr-active #hud { display:none; }

  /* Botón VR de Three.js: lo dejamos abajo centrado y visible */
  #VRButton {
    z-index: 6 !important;
  }
  #depth {
    position:fixed; right:16px; bottom:16px; z-index:5;
    font-size:11px; color:rgba(200,210,255,.7);
    background:rgba(10,8,26,.6); border:1px solid rgba(150,130,255,.2);
    border-radius:10px; padding:7px 11px; backdrop-filter:blur(8px);
    font-variant-numeric:tabular-nums;
  }
  body.xr-active #depth { display:none; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="hud">
  <h1>VIAJE FRACTAL VR</h1>
  <p class="sub">Mandelbulb vivo por raymarching. Pulsa “Enter VR” en Quest, o vuela en escritorio.</p>

  <div class="ctrl">
    <label>Desarrollo <span id="vGrow">suave</span></label>
    <input id="grow" type="range" min="0" max="100" value="40">
  </div>
  <div class="ctrl">
    <label>Velocidad de viaje <span id="vSpeed">1.0×</span></label>
    <input id="speed" type="range" min="0" max="100" value="35">
  </div>
  <div class="ctrl">
    <label>Detalle / iteraciones <span id="vDetail">media</span></label>
    <input id="detail" type="range" min="0" max="100" value="46">
  </div>
  <div class="ctrl">
    <label>Color <span id="vHue">violeta</span></label>
    <input id="hue" type="range" min="0" max="100" value="62">
  </div>

  <div class="row">
    <button id="autoBtn" class="active">Auto-viaje</button>
    <button id="pauseBtn">Pausar</button>
  </div>

  <div id="keys">
    <b>Escritorio:</b> arrastra para mirar · rueda y W/S para avanzar<br>
    <b>VR:</b> gatillo = auto-viaje on/off · stick/empuje = avanzar
  </div>
</div>

<div id="depth">profundidad —</div>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let renderer, scene, camera, controls, clock, quad, material;
let autoTravel = true, paused = false;

let growAmt = 0.40, speed = 0.6, detail = 0.46, hue = 0.62 * 6.283;
// "flyOffset" desplaza el espacio del fractal: así viajamos hacia su interior.
let flyDist = 2.6;            // distancia de inmersión (más pequeño = más dentro)
let simTime = 0;
const keyboard = new Set();
const controllers = [];

const vertexShader = /* glsl */`
  varying vec3 vWorldDir;
  varying vec3 vCamPos;
  void main(){
    // Reconstruir el rayo del mundo por ojo desde las matrices de la cámara.
    vec4 worldPos = modelMatrix * vec4(position, 1.0);
    vCamPos = cameraPosition;
    vWorldDir = worldPos.xyz - cameraPosition;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

const fragmentShader = /* glsl */`
  precision highp float;
  varying vec3 vWorldDir;
  varying vec3 vCamPos;

  uniform float uTime;
  uniform float uPower;
  uniform float uDetail;
  uniform float uHue;
  uniform float uGrow;
  uniform float uFly;       // escala de inmersión
  uniform vec3  uCenter;    // centro del fractal en el mundo

  #define MAX_STEPS 140
  #define MAX_DIST  14.0
  #define SURF      0.00045

  float mandelbulb(vec3 pos, out float trap){
    vec3 z = pos;
    float dr = 1.0;
    float r = 0.0;
    trap = 1e10;
    int iters = int(6.0 + uDetail * 8.0);
    for(int i=0;i<14;i++){
      if(i>=iters) break;
      r = length(z);
      if(r > 2.0) break;
      float theta = acos(z.z / r);
      float phi   = atan(z.y, z.x);
      dr = pow(r, uPower-1.0)*uPower*dr + 1.0;
      float zr = pow(r, uPower);
      theta *= uPower;
      phi   *= uPower;
      z = zr * vec3(sin(theta)*cos(phi), sin(theta)*sin(phi), cos(theta));
      z += pos;
      trap = min(trap, r);
    }
    return 0.5 * log(r) * r / dr;
  }

  float map(vec3 p, out float trap){
    // Llevar el punto del mundo al espacio local del fractal.
    vec3 q = (p - uCenter) / uFly;
    return mandelbulb(q, trap) * uFly;
  }

  vec3 calcNormal(vec3 p){
    vec2 e = vec2(0.0012, 0.0);
    float t;
    return normalize(vec3(
      map(p+e.xyy,t)-map(p-e.xyy,t),
      map(p+e.yxy,t)-map(p-e.yxy,t),
      map(p+e.yyx,t)-map(p-e.yyx,t)
    ));
  }

  vec3 palette(float t){
    vec3 a = vec3(0.5);
    vec3 b = vec3(0.5);
    vec3 c = vec3(1.0);
    vec3 d = vec3(0.0, 0.33, 0.67) + uHue;
    return a + b*cos(6.28318*(c*t + d));
  }

  void main(){
    vec3 ro = vCamPos;
    vec3 rd = normalize(vWorldDir);

    float t = 0.0;
    float trap = 0.0;
    float glow = 0.0;
    bool hit = false;
    int steps = int(70.0 + uDetail*70.0);

    for(int i=0;i<MAX_STEPS;i++){
      if(i>=steps) break;
      vec3 p = ro + rd*t;
      float tr;
      float d = map(p, tr);
      glow += 0.013 / (1.0 + d*d*150.0);
      if(d < SURF*(1.0 + t*0.4)){ hit = true; trap = tr; break; }
      t += d*0.82;
      if(t > MAX_DIST) break;
    }

    vec3 col;
    if(hit){
      vec3 p = ro + rd*t;
      vec3 n = calcNormal(p);
      vec3 lightDir = normalize(vec3(0.6, 0.7, 0.4));
      float diff = clamp(dot(n, lightDir), 0.0, 1.0);
      float amb  = 0.35 + 0.65*n.y;
      float ao = 1.0 / (1.0 + t*0.3);
      vec3 base  = palette(trap*1.6 + uTime*0.02);
      vec3 base2 = palette(trap*2.4 + 0.4);
      base = mix(base, base2, 0.4);
      col = base * (0.25 + diff*0.9) * (0.5 + amb*0.5) * ao;
      vec3 h = normalize(lightDir - rd);
      col += vec3(1.0,0.95,0.9) * pow(clamp(dot(n,h),0.0,1.0), 28.0) * 0.4;
      col = mix(col, vec3(0.02,0.01,0.05), clamp(t/MAX_DIST, 0.0, 1.0)*0.55);
    } else {
      col = vec3(0.012, 0.008, 0.03);
    }

    vec3 glowCol = palette(uHue + 0.15 + glow*0.3);
    col += glowCol * glow * (0.55 + uGrow*0.5);
    col = pow(col, vec3(0.85));
    gl_FragColor = vec4(col, 1.0);
  }
`;

init();
renderer.setAnimationLoop(render);

function init(){
  clock = new THREE.Clock();
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.01, 100);
  camera.position.set(0, 1.6, 0);

  renderer = new THREE.WebGLRenderer({ antialias:false, powerPreference:'high-performance' });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
  renderer.setSize(innerWidth, innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);
  document.body.appendChild(VRButton.createButton(renderer));

  material = new THREE.ShaderMaterial({
    uniforms: {
      uTime:   { value: 0 },
      uPower:  { value: 8 },
      uDetail: { value: detail },
      uHue:    { value: hue },
      uGrow:   { value: growAmt },
      uFly:    { value: flyDist },
      uCenter: { value: new THREE.Vector3(0, 1.6, -0.0) }
    },
    vertexShader,
    fragmentShader,
    side: THREE.BackSide,
    depthWrite: false,
    depthTest: false
  });

  // Domo que envuelve al espectador. CLAVE para VR: lo parentamos a la cámara,
  // no lo movemos a mano. Así Three.js rinde la escena una vez por ojo y
  // 'cameraPosition' en el shader toma la posición REAL de cada ojo -> estéreo.
  quad = new THREE.Mesh(new THREE.SphereGeometry(20, 32, 16), material);
  quad.frustumCulled = false;
  camera.add(quad);          // <-- parentado a la cámara
  scene.add(camera);         // la cámara debe estar en la escena para que el hijo se renderice

  // El centro del fractal vive en el espacio del mundo, frente a la posición inicial.
  material.uniforms.uCenter.value.set(0, 1.6, -2.4);

  // En escritorio: rotación de la mirada con el ratón, sin colapsar la cámara.
  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 1.6, -2.4);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.enablePan = false;
  controls.enableZoom = false;   // el acercamiento es por uFly
  controls.minDistance = 2.4;
  controls.maxDistance = 2.4;

  renderer.xr.addEventListener('sessionstart', ()=>{
    document.body.classList.add('xr-active');
    controls.enabled = false;
  });
  renderer.xr.addEventListener('sessionend', ()=>{
    document.body.classList.remove('xr-active');
    controls.enabled = true;
  });

  setupControllers();
  setupUI();

  addEventListener('resize', onResize);
  addEventListener('keydown', e=>{ keyboard.add(e.code); if(['KeyW','KeyS'].includes(e.code)){ autoTravel=false; syncAuto(); } });
  addEventListener('keyup', e=>keyboard.delete(e.code));
}

function setupControllers(){
  for(let i=0;i<2;i++){
    const c = renderer.xr.getController(i);
    c.addEventListener('selectstart', ()=>{ autoTravel = !autoTravel; syncAuto(); });
    // Mantener el gatillo apretado hace avanzar; squeeze retrocede.
    c.addEventListener('squeezestart', ()=>{ c.userData.reverse = true; });
    c.addEventListener('squeezeend',   ()=>{ c.userData.reverse = false; });
    scene.add(c);
    controllers.push(c);
  }
}

function setupUI(){
  const $ = id=>document.getElementById(id);
  $('grow').addEventListener('input', e=>{ growAmt=e.target.value/100; $('vGrow').textContent = growAmt<0.05?'quieto':growAmt<0.5?'suave':'intenso'; });
  $('speed').addEventListener('input', e=>{ speed=e.target.value/100*1.8; $('vSpeed').textContent=(speed/0.6).toFixed(1)+'×'; });
  $('detail').addEventListener('input', e=>{ detail=e.target.value/100; material.uniforms.uDetail.value=detail; $('vDetail').textContent = detail<0.34?'baja':detail<0.67?'media':'alta'; });
  $('hue').addEventListener('input', e=>{ hue=e.target.value/100*6.283; const names=['fuego','ámbar','verdor','turquesa','violeta','magenta']; $('vHue').textContent=names[Math.floor(e.target.value/100*5.99)]; });

  const autoBtn=$('autoBtn'), pauseBtn=$('pauseBtn');
  autoBtn.addEventListener('click', ()=>{ autoTravel=!autoTravel; syncAuto(); });
  pauseBtn.addEventListener('click', ()=>{ paused=!paused; pauseBtn.textContent=paused?'Reanudar':'Pausar'; pauseBtn.classList.toggle('active', paused); });
}
function syncAuto(){ const b=document.getElementById('autoBtn'); b.classList.toggle('active', autoTravel); b.textContent = autoTravel?'Auto-viaje':'Manual'; }

function onResize(){
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

function render(){
  const dt = Math.min(clock.getDelta(), 0.05);
  if(!paused) simTime += dt;

  // Auto-viaje: nos sumergimos y emergemos del fractal en bucle.
  if(autoTravel && !paused){
    flyDist = 1.7 + 1.05*Math.sin(simTime*0.13*speed);
    flyDist = Math.max(0.65, flyDist);
  }

  // Avance manual (escritorio).
  const ks = dt*1.1*speed;
  if(keyboard.has('KeyW')) flyDist = Math.max(0.45, flyDist - ks);
  if(keyboard.has('KeyS')) flyDist = Math.min(6.0, flyDist + ks);

  // Avance en VR: gatillo apretado avanza, squeeze retrocede.
  if(renderer.xr.isPresenting){
    for(const c of controllers){
      // Detectar gatillo mediante gamepad del controlador XR.
      const src = c.userData.inputSource;
      if(src && src.gamepad){
        const trigger = src.gamepad.buttons[0]?.value || 0;
        if(trigger > 0.1 && !autoTravel) flyDist = Math.max(0.45, flyDist - dt*1.6*speed*trigger);
      }
      if(c.userData.reverse) flyDist = Math.min(6.0, flyDist + dt*1.6*speed);
    }
  }

  // El "power" animado hace crecer/transformar el fractal.
  const power = 8.0 + Math.sin(simTime*0.25)*1.5*growAmt;

  material.uniforms.uTime.value  = simTime;
  material.uniforms.uPower.value = power;
  material.uniforms.uGrow.value  = growAmt;
  material.uniforms.uFly.value   = flyDist;

  // El domo YA sigue a la cámara (es su hijo): no se reposiciona a mano.
  // El centro del fractal se mantiene frente a la cámara, en el mundo,
  // usando su posición y orientación de cuerpo (no la de un ojo concreto),
  // de modo que ambos ojos comparten el mismo fractal y conservan su paralaje.
  const camWorld = new THREE.Vector3();
  const camDir = new THREE.Vector3();
  camera.getWorldPosition(camWorld);
  camera.getWorldDirection(camDir);
  material.uniforms.uCenter.value.copy(camWorld).addScaledVector(camDir, 2.4);

  if(!renderer.xr.isPresenting) controls.update();

  renderer.render(scene, camera);

  const depthPct = Math.max(0, Math.min(100, (1 - (flyDist-0.45)/(6.0-0.45))*100));
  const d = document.getElementById('depth');
  if(d) d.textContent = 'profundidad ' + depthPct.toFixed(0) + '%';
}

// Capturar la fuente de entrada de cada controlador para leer el gatillo.
renderer.xr.addEventListener('sessionstart', ()=>{
  const s = renderer.xr.getSession();
  if(!s) return;
  const assign = ()=>{
    const sources = s.inputSources;
    for(let i=0;i<controllers.length;i++){
      controllers[i].userData.inputSource = sources[i];
    }
  };
  s.addEventListener('inputsourceschange', assign);
  assign();
});
</script>
</body>
</html>
