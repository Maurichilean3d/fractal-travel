<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Viaje Fractal VR — Multiverso</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; width:100%; height:100%; overflow:hidden; background:#000; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
  canvas { display:block; }
  #hud {
    position:fixed; left:16px; top:16px; z-index:5;
    width:min(330px, calc(100vw - 32px));
    padding:14px 16px;
    color:#dfe9ff;
    background:linear-gradient(150deg, rgba(10,8,26,.86), rgba(8,6,18,.5));
    border:1px solid rgba(150,130,255,.22);
    border-radius:16px;
    box-shadow:0 18px 60px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
    backdrop-filter:blur(14px);
    user-select:none;
  }
  #hud h1 { margin:0 0 4px; font-size:15px; letter-spacing:.5px; font-weight:700; }
  #hud .sub { margin:0 0 12px; font-size:11px; line-height:1.4; color:rgba(200,210,255,.62); }
  .ctrl { margin:10px 0; }
  .ctrl label { display:flex; justify-content:space-between; font-size:11px; letter-spacing:.3px; color:rgba(214,224,255,.85); margin-bottom:5px; }
  .ctrl label span { color:#b9a8ff; font-variant-numeric:tabular-nums; }
  input[type=range] { width:100%; accent-color:#9a7bff; height:4px; }
  .figs { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin:6px 0 4px; }
  .figs button { font-size:11px; padding:7px 6px; }
  .row { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  button {
    appearance:none; cursor:pointer;
    border:1px solid rgba(150,130,255,.3);
    border-radius:999px;
    background:rgba(90,70,200,.2);
    color:#ede8ff; font-family:inherit; font-size:12px; font-weight:700;
    padding:8px 10px;
  }
  .row button { flex:1; min-width:84px; }
  button:hover { background:rgba(120,95,240,.34); }
  button.active { background:rgba(150,120,255,.5); border-color:rgba(190,170,255,.6); }
  #keys { margin-top:12px; font-size:10px; line-height:1.5; color:rgba(190,200,235,.5); }
  #keys b { color:rgba(214,224,255,.78); font-weight:600; }
  body.xr-active #hud { display:none; }
  #stat {
    position:fixed; right:16px; bottom:16px; z-index:5;
    font-size:11px; color:rgba(200,210,255,.7);
    background:rgba(10,8,26,.6); border:1px solid rgba(150,130,255,.2);
    border-radius:10px; padding:7px 11px; backdrop-filter:blur(8px);
    font-variant-numeric:tabular-nums; text-align:right; line-height:1.5;
  }
  body.xr-active #stat { display:none; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="hud">
  <h1>VIAJE FRACTAL · MULTIVERSO</h1>
  <p class="sub">Raymarching optimizado con resolución adaptativa. Elige una figura y sumérgete.</p>

  <div class="figs" id="figs">
    <button data-fig="0" class="active">Mandelbulb</button>
    <button data-fig="1">Mandelbox</button>
    <button data-fig="2">Menger</button>
    <button data-fig="3">Fibonacci</button>
  </div>

  <div class="ctrl">
    <label>Desarrollo <span id="vGrow">suave</span></label>
    <input id="grow" type="range" min="0" max="100" value="40">
  </div>
  <div class="ctrl">
    <label>Velocidad de viaje <span id="vSpeed">1.0×</span></label>
    <input id="speed" type="range" min="0" max="100" value="35">
  </div>
  <div class="ctrl">
    <label>Detalle <span id="vDetail">media</span></label>
    <input id="detail" type="range" min="0" max="100" value="46">
  </div>
  <div class="ctrl">
    <label>Color <span id="vHue">violeta</span></label>
    <input id="hue" type="range" min="0" max="100" value="62">
  </div>
  <div class="ctrl">
    <label>Apertura del cono <span id="vCone">55°</span></label>
    <input id="cone" type="range" min="20" max="90" value="55">
  </div>

  <div class="row">
    <button id="autoBtn" class="active">Auto-viaje</button>
    <button id="pauseBtn">Pausar</button>
    <button id="perfBtn" class="active">Auto-calidad</button>
    <button id="coneBtn" class="active">Cono</button>
  </div>

  <div id="keys">
    <b>Escritorio:</b> arrastra para mirar · rueda y W/S avanzan<br>
    <b>VR:</b> gatillo = avanzar · squeeze = retroceder
  </div>
</div>

<div id="stat">fps —<br>res —</div>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let renderer, scene, camera, camRig, controls, clock, quad, material;
let autoTravel = true, paused = false, autoPerf = true;

let growAmt = 0.40, speed = 0.6, detail = 0.46, hue = 0.62 * 6.283;
let simTime = 0, figure = 0;

// El fractal está FIJO en este punto del mundo. Nunca persigue la mirada.
const FRACTAL_CENTER = new THREE.Vector3(0, 1.6, -3.0);
// Distancia real de la cámara al fractal. Viajar = cambiar esta distancia.
let travelDist = 3.2;
const TRAVEL_MIN = 1.05, TRAVEL_MAX = 7.0;

const keyboard = new Set();
const controllers = [];

// --- resolución adaptativa ---
let curRatio = 1.2;
const MIN_RATIO = 0.6, MAX_RATIO = 1.6;
let fpsAccum = 0, fpsFrames = 0, fpsValue = 60, ratioCooldown = 0;

const vertexShader = /* glsl */`
  varying vec3 vDir;
  void main(){
    vec4 wp = modelMatrix * vec4(position, 1.0);
    vDir = wp.xyz - cameraPosition;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

// Un único shader con switch de figura por #define en runtime (uniform int).
// Cada DE (distance estimator) está optimizado; el bucle de marcha es compartido.
const fragmentShader = /* glsl */`
  precision highp float;
  varying vec3 vDir;

  uniform float uTime, uPower, uDetail, uHue, uGrow, uFly;
  uniform int   uFigure;
  uniform vec3  uCenter;
  uniform vec3  uForward;     // eje de la cámara (mundo), por ojo
  uniform float uConeCos;     // coseno del semiángulo del cono (1=cerrado, -1=todo)
  uniform float uConeOn;      // 1 = clipping activo, 0 = desactivado

  #define MAX_STEPS 96
  #define MAX_DIST  12.0

  // ---------- DE 0: Mandelbulb ----------
  float deBulb(vec3 p, out float trap){
    vec3 z = p; float dr = 1.0, r = 0.0; trap = 1e10;
    int it = int(5.0 + uDetail*6.0);
    for(int i=0;i<11;i++){
      if(i>=it) break;
      r = max(length(z), 1e-6);
      trap = min(trap, r);
      if(r>2.0) break;
      float th = acos(clamp(z.z/r, -1.0, 1.0));
      float ph = atan(z.y,z.x);
      dr = pow(r,uPower-1.0)*uPower*dr + 1.0;
      float zr = pow(r,uPower); th*=uPower; ph*=uPower;
      z = zr*vec3(sin(th)*cos(ph), sin(th)*sin(ph), cos(th)) + p;
    }
    r = max(r, 1e-6);
    return 0.5*log(r)*r/dr;
  }

  // ---------- DE 1: Mandelbox (cajas) ----------
  float deBox(vec3 p, out float trap){
    vec3 z = p; float dr = 1.0; trap = 1e10;
    float scale = 2.4 + sin(uTime*0.2)*0.25*uGrow;
    int it = int(7.0 + uDetail*7.0);
    for(int i=0;i<14;i++){
      if(i>=it) break;
      // plegado de caja
      z = clamp(z, -1.0, 1.0)*2.0 - z;
      float r2 = dot(z,z);
      // plegado esférico
      if(r2 < 0.25){ float t=4.0; z*=t; dr*=t; }
      else if(r2 < 1.0){ float t=1.0/r2; z*=t; dr*=t; }
      z = scale*z + p; dr = dr*abs(scale) + 1.0;
      trap = min(trap, r2);
    }
    return length(z)/abs(dr);
  }

  // ---------- DE 2: Menger Sponge (cubos recursivos) ----------
  float sdBoxd(vec3 p, vec3 b){ vec3 d=abs(p)-b; return length(max(d,0.0))+min(max(d.x,max(d.y,d.z)),0.0); }
  float deMenger(vec3 p, out float trap){
    float d = sdBoxd(p, vec3(1.0));
    trap = d;
    float s = 1.0;
    int it = int(3.0 + uDetail*3.0);
    for(int m=0;m<6;m++){
      if(m>=it) break;
      vec3 a = mod(p*s, 2.0) - 1.0;
      s *= 3.0;
      vec3 r = abs(1.0 - 3.0*abs(a));
      float da = max(r.x, r.y);
      float db = max(r.y, r.z);
      float dc = max(r.z, r.x);
      float c = (min(da, min(db, dc)) - 1.0)/s;
      d = max(d, c);
      trap = min(trap, d);
    }
    return d;
  }

  // ---------- DE 3: Orgánico Fibonacci (espiral áurea) ----------
  // Esferas distribuidas en el ángulo dorado formando una concha/girasol.
  float deFibo(vec3 p, out float trap){
    float ga = 2.39996323;          // ángulo áureo
    float d = 1e10; trap = 1e10;
    float n = 22.0 + uDetail*30.0;
    float grow = 1.0 + 0.15*sin(uTime*0.3)*uGrow;
    for(int i=0;i<60;i++){
      if(float(i) >= n) break;
      float fi = float(i);
      float t = fi/n;
      float radius = pow(t, 0.5) * 1.6 * grow;       // crecimiento radial
      float ang = fi * ga + uTime*0.1;
      float y = (t*2.0 - 1.0) * 1.2;
      vec3 c = vec3(cos(ang)*radius, y, sin(ang)*radius);
      float sph = length(p - c) - (0.05 + 0.14*(1.0-t));
      d = min(d, sph);
      trap = min(trap, length(p-c));
    }
    return d*0.6;
  }

  float map(vec3 wp, out float trap){
    vec3 p = (wp - uCenter)/uFly;
    float d;
    if(uFigure==0) d = deBulb(p, trap);
    else if(uFigure==1) d = deBox(p, trap);
    else if(uFigure==2) d = deMenger(p, trap);
    else d = deFibo(p, trap);
    return d*uFly;
  }

  // Normal por tetraedro: 4 muestras en vez de 6 (más barato, misma calidad).
  vec3 calcNormal(vec3 p){
    const vec2 k = vec2(1.0, -1.0);
    float h = 0.0012; float t;
    return normalize(
      k.xyy*map(p+k.xyy*h,t) + k.yyx*map(p+k.yyx*h,t) +
      k.yxy*map(p+k.yxy*h,t) + k.xxx*map(p+k.xxx*h,t)
    );
  }

  vec3 palette(float t){
    return 0.5 + 0.5*cos(6.28318*(vec3(1.0)*t + vec3(0.0,0.33,0.67) + uHue));
  }

  // Intersección rayo-esfera: t de entrada/salida. Devuelve false si no toca.
  bool hitBounds(vec3 ro, vec3 rd, vec3 ce, float ra, out float tN, out float tF){
    vec3 oc = ro - ce;
    float b = dot(oc, rd);
    float c = dot(oc, oc) - ra*ra;
    float h = b*b - c;
    if(h < 0.0) return false;
    h = sqrt(h);
    tN = -b - h; tF = -b + h;
    return tF > 0.0;
  }

  // Raymarching + sombreado. 'fove' (0..1) modula los pasos: 1 en el foco,
  // menos hacia el borde del cono -> foveated rendering barato.
  void marchAndShade(vec3 ro, vec3 rd, float fove, vec3 voidCol){
    // Esfera limitadora alrededor del fractal: saltamos el vacío y arrancamos
    // el rayo justo en su entrada -> ahorro enorme de pasos cuando estás lejos.
    float tN, tF;
    float bound = uFly*1.6 + 0.4;
    if(!hitBounds(ro, rd, uCenter, bound, tN, tF)){
      gl_FragColor = vec4(voidCol, 1.0);
      return;
    }
    float t = max(tN, 0.0);
    float tEnd = min(tF, MAX_DIST);

    float trap = 0.0, glow = 0.0;
    bool hit = false;
    int steps = int((48.0 + uDetail*40.0) * (0.55 + 0.45*fove));

    for(int i=0;i<MAX_STEPS;i++){
      if(i>=steps) break;
      vec3 p = ro + rd*t;
      float tr;
      float d = map(p, tr);
      glow += 0.012 / (1.0 + d*d*160.0);
      float eps = 0.0006 + t*0.0012;
      if(d < eps){ hit = true; trap = tr; break; }
      t += d*0.9;
      if(t > tEnd) break;
    }

    vec3 col;
    if(hit){
      vec3 p = ro + rd*t;
      vec3 n = calcNormal(p);
      vec3 L = normalize(vec3(0.6,0.7,0.4));
      float diff = clamp(dot(n,L),0.0,1.0);
      float amb = 0.35 + 0.65*n.y;
      float ao = 1.0/(1.0 + t*0.3);
      vec3 base = mix(palette(trap*1.6 + uTime*0.02), palette(trap*2.4+0.4), 0.4);
      col = base*(0.25 + diff*0.9)*(0.5 + amb*0.5)*ao;
      vec3 hh = normalize(L - rd);
      col += vec3(1.0,0.95,0.9)*pow(clamp(dot(n,hh),0.0,1.0),28.0)*0.4;
      col = mix(col, vec3(0.02,0.01,0.05), clamp(t/MAX_DIST,0.0,1.0)*0.55);
    } else {
      col = vec3(0.012,0.008,0.03);
    }
    col += palette(uHue+0.15+glow*0.3)*glow*(0.55 + uGrow*0.5);
    col = pow(col, vec3(0.85));
    // Fundido hacia el vacío en la banda del borde del cono.
    col = mix(voidCol, col, clamp(fove, 0.0, 1.0));
    gl_FragColor = vec4(col, 1.0);
  }

  void main(){
    vec3 ro = cameraPosition;
    vec3 rd = normalize(vDir);

    // --- CONO DE RENDERIZADO ---
    // Ángulo del rayo respecto al eje de la cámara. Cuanto más cerca de 1,
    // más centrado en la mirada está el píxel.
    float cosAng = dot(rd, normalize(uForward));
    vec3 voidCol = vec3(0.010, 0.007, 0.026);

    if(uConeOn > 0.5){
      // Fuera del cono: descartar el raymarching por completo (ahorro máximo).
      // Banda de transición suave para evitar un borde duro.
      float edge = smoothstep(uConeCos - 0.06, uConeCos, cosAng);
      if(cosAng < uConeCos - 0.06){
        gl_FragColor = vec4(voidCol, 1.0);
        return;
      }
      // 'fove' = 1 en el centro del cono, baja hacia el borde -> menos pasos ahí.
      float fove = edge;
      marchAndShade(ro, rd, fove, voidCol);
      return;
    }

    // Cono desactivado: calidad uniforme en todo el cuadro.
    marchAndShade(ro, rd, 1.0, voidCol);
  }
`;

init();
renderer.setAnimationLoop(render);

function init(){
  clock = new THREE.Clock();
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.01, 100);

  // Rig: contenedor de la cámara. El VIAJE mueve el rig hacia el fractal,
  // no el fractal hacia la cámara. Así en VR el objeto queda FIJO en el
  // espacio y mover la cabeza solo cambia tu punto de vista (como debe ser).
  camRig = new THREE.Group();
  camRig.add(camera);
  scene.add(camRig);

  renderer = new THREE.WebGLRenderer({ antialias:false, powerPreference:'high-performance' });
  curRatio = Math.min(devicePixelRatio, 1.3);
  renderer.setPixelRatio(curRatio);
  renderer.setSize(innerWidth, innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);
  document.body.appendChild(VRButton.createButton(renderer));

  material = new THREE.ShaderMaterial({
    uniforms: {
      uTime:{value:0}, uPower:{value:8}, uDetail:{value:detail},
      uHue:{value:hue}, uGrow:{value:growAmt}, uFly:{value:1.0},
      uFigure:{value:0}, uCenter:{value:FRACTAL_CENTER.clone()},
      uForward:{value:new THREE.Vector3(0,0,-1)},
      uConeCos:{value:Math.cos(THREE.MathUtils.degToRad(55))},
      uConeOn:{value:1}
    },
    vertexShader, fragmentShader,
    side: THREE.BackSide, depthWrite:false, depthTest:false
  });

  // Domo envolvente, hijo de la cámara: cubre todo el FOV por ojo (estéreo OK).
  quad = new THREE.Mesh(new THREE.SphereGeometry(20, 24, 12), material);
  quad.frustumCulled = false;
  camera.add(quad);

  // Posición inicial del rig: a 'travelDist' del fractal, mirándolo.
  positionRig();

  // OrbitControls SOLO en escritorio. Se aplica al rig, no a la cámara:
  // así evitamos mezclar coordenadas locales de una cámara hija con coordenadas de mundo.
  controls = new OrbitControls(camRig, renderer.domElement);
  controls.target.copy(FRACTAL_CENTER);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.enablePan = false;
  controls.enableZoom = false;
  controls.minDistance = travelDist; controls.maxDistance = travelDist;
  controls.update();

  renderer.xr.addEventListener('sessionstart', ()=>{
    document.body.classList.add('xr-active');
    controls.enabled=false;
    // Al entrar a VR, limpiamos cualquier rotación de OrbitControls en el rig.
    // La orientación de la cabeza la debe manejar el visor.
    camRig.quaternion.identity();
    positionRig();
    // En VR recortar el FOV produce efecto túnel; lo desactivamos por defecto.
    material.uniforms.uConeOn.value = 0;
  });
  renderer.xr.addEventListener('sessionend', ()=>{
    document.body.classList.remove('xr-active');
    controls.enabled=true;
    controls.target.copy(FRACTAL_CENTER);
    controls.minDistance = controls.maxDistance = travelDist;
    controls.update();
    const b=document.getElementById('coneBtn');
    material.uniforms.uConeOn.value = (b && b.classList.contains('active')) ? 1 : 0;
  });

  setupControllers();
  setupUI();
  addEventListener('resize', onResize);
  addEventListener('keydown', e=>{ keyboard.add(e.code); if(['KeyW','KeyS'].includes(e.code)){ autoTravel=false; syncAuto(); } });
  addEventListener('keyup', e=>keyboard.delete(e.code));
  addEventListener('wheel', e=>{
    e.preventDefault();
    travelDist = Math.max(TRAVEL_MIN, Math.min(TRAVEL_MAX, travelDist*(1+Math.sign(e.deltaY)*0.05)));
    autoTravel=false;
    syncAuto();
  }, {passive:false});
}

// Coloca el rig a 'travelDist' del fractal, sobre el eje Z, mirándolo.
// En VR no tocamos la orientación de la cámara (la maneja el visor);
// solo movemos el rig en el espacio, así el objeto se queda fijo.
function positionRig(){
  if(!camRig) return;
  camRig.position.set(FRACTAL_CENTER.x, FRACTAL_CENTER.y, FRACTAL_CENTER.z + travelDist);
}

function setupControllers(){
  for(let i=0;i<2;i++){
    const c = renderer.xr.getController(i);
    c.userData.inputSource = null;
    c.userData.reverse = false;
    c.addEventListener('connected', event=>{ c.userData.inputSource = event.data; });
    c.addEventListener('disconnected', ()=>{ c.userData.inputSource = null; c.userData.reverse = false; });
    c.addEventListener('squeezestart', ()=>{ c.userData.reverse=true; });
    c.addEventListener('squeezeend', ()=>{ c.userData.reverse=false; });
    scene.add(c);
    controllers.push(c);
  }
}

function setupUI(){
  const $ = id=>document.getElementById(id);
  $('grow').addEventListener('input', e=>{ growAmt=e.target.value/100; material.uniforms.uGrow.value=growAmt; $('vGrow').textContent = growAmt<0.05?'quieto':growAmt<0.5?'suave':'intenso'; });
  $('speed').addEventListener('input', e=>{ speed=e.target.value/100*1.8; $('vSpeed').textContent=(speed/0.6).toFixed(1)+'×'; });
  $('detail').addEventListener('input', e=>{ detail=e.target.value/100; material.uniforms.uDetail.value=detail; $('vDetail').textContent = detail<0.34?'baja':detail<0.67?'media':'alta'; });
  $('hue').addEventListener('input', e=>{ hue=e.target.value/100*6.283; material.uniforms.uHue.value=hue; const names=['fuego','ámbar','verdor','turquesa','violeta','magenta']; $('vHue').textContent=names[Math.floor(e.target.value/100*5.99)]; });
  $('cone').addEventListener('input', e=>{ const deg=Number(e.target.value); material.uniforms.uConeCos.value=Math.cos(THREE.MathUtils.degToRad(deg)); $('vCone').textContent=deg+'°'; });

  document.querySelectorAll('#figs button').forEach(b=>{
    b.addEventListener('click', ()=>{
      figure = parseInt(b.dataset.fig);
      material.uniforms.uFigure.value = figure;
      document.querySelectorAll('#figs button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    });
  });

  const autoBtn=$('autoBtn'), pauseBtn=$('pauseBtn'), perfBtn=$('perfBtn'), coneBtn=$('coneBtn');
  autoBtn.addEventListener('click', ()=>{ autoTravel=!autoTravel; syncAuto(); });
  pauseBtn.addEventListener('click', ()=>{ paused=!paused; pauseBtn.textContent=paused?'Reanudar':'Pausar'; pauseBtn.classList.toggle('active', paused); });
  perfBtn.addEventListener('click', ()=>{ autoPerf=!autoPerf; perfBtn.classList.toggle('active', autoPerf); });
  coneBtn.addEventListener('click', ()=>{ const on = material.uniforms.uConeOn.value > 0.5; material.uniforms.uConeOn.value = on?0:1; coneBtn.classList.toggle('active', !on); });

  syncUIValues();
}
function syncUIValues(){
  const fire = id => document.getElementById(id).dispatchEvent(new Event('input'));
  ['grow','speed','detail','hue','cone'].forEach(fire);
}
function syncAuto(){ const b=document.getElementById('autoBtn'); if(!b) return; b.classList.toggle('active', autoTravel); b.textContent = autoTravel?'Auto-viaje':'Manual'; }

function onResize(){
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

// Ajuste dinámico de resolución según fps (no se aplica dentro de XR: el visor manda).
function updateAdaptiveRes(dt){
  if(!autoPerf || renderer.xr.isPresenting) return;
  fpsAccum += dt; fpsFrames++;
  ratioCooldown -= dt;
  if(fpsAccum >= 0.5){
    fpsValue = fpsFrames/fpsAccum;
    fpsAccum = 0; fpsFrames = 0;
    if(ratioCooldown <= 0){
      if(fpsValue < 45 && curRatio > MIN_RATIO){ curRatio = Math.max(MIN_RATIO, curRatio-0.15); renderer.setPixelRatio(curRatio); ratioCooldown=1.0; }
      else if(fpsValue > 58 && curRatio < MAX_RATIO){ curRatio = Math.min(MAX_RATIO, curRatio+0.1); renderer.setPixelRatio(curRatio); ratioCooldown=1.5; }
    }
  }
}

function render(){
  const dt = Math.min(clock.getDelta(), 0.05);
  if(!paused) simTime += dt;

  // Auto-viaje: oscila la DISTANCIA al fractal (acercarse / alejarse).
  if(autoTravel && !paused){
    const wave = 0.5 + 0.5*Math.sin(simTime*0.13*speed);
    travelDist = THREE.MathUtils.lerp(TRAVEL_MAX, TRAVEL_MIN, wave);
  }
  const ks = dt*1.4*speed;
  if(keyboard.has('KeyW')) travelDist = Math.max(TRAVEL_MIN, travelDist-ks);
  if(keyboard.has('KeyS')) travelDist = Math.min(TRAVEL_MAX, travelDist+ks);

  if(renderer.xr.isPresenting){
    for(const c of controllers){
      const src = c.userData.inputSource;
      if(src && src.gamepad){
        const trig = src.gamepad.buttons[0]?.value || 0;
        if(trig > 0.1) travelDist = Math.max(TRAVEL_MIN, travelDist - dt*1.8*speed*trig);
      }
      if(c.userData.reverse) travelDist = Math.min(TRAVEL_MAX, travelDist + dt*1.8*speed);
    }
  }

  material.uniforms.uTime.value = simTime;
  material.uniforms.uPower.value = 8.0 + Math.sin(simTime*0.25)*1.5*growAmt;

  // La escala del fractal en el shader crece al acercarte -> más detalle visible.
  // (distancia pequeña => uFly pequeño => el fractal "ocupa" más campo).
  const uFly = THREE.MathUtils.clamp(travelDist*0.42, 0.4, 3.2);
  material.uniforms.uFly.value = uFly;

  // El fractal está FIJO: el uniform uCenter no cambia con la mirada.
  // (se quedó en FRACTAL_CENTER desde init).

  if(renderer.xr.isPresenting){
    // En VR movemos el rig acercándolo/alejándolo del fractal en su eje,
    // sin tocar la orientación de la cámara (la controla el visor).
    positionRig();
  } else {
    // En escritorio, OrbitControls orbita la cámara alrededor del fractal fijo.
    controls.minDistance = controls.maxDistance = travelDist;
    controls.update();
  }

  // Eje del cono = dirección de la cámara HACIA el fractal (enmarca el objeto,
  // no la cabeza). Así girar la vista no arrastra el recorte de forma rara.
  const camWorld = new THREE.Vector3();
  camera.getWorldPosition(camWorld);
  material.uniforms.uForward.value.copy(FRACTAL_CENTER).sub(camWorld).normalize();

  updateAdaptiveRes(dt);
  renderer.render(scene, camera);

  const s = document.getElementById('stat');
  if(s && !renderer.xr.isPresenting) s.innerHTML = 'fps '+fpsValue.toFixed(0)+'<br>res '+(curRatio).toFixed(2)+'×';
}

</script>
